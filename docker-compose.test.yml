services:
  db-test:
    image: postgres:18-alpine
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prilot_test
    ports:
      - "5433:5432"
    tmpfs:
      # Use RAM for the data directory — much faster for tests, wiped on container stop
      - /var/lib/postgresql
